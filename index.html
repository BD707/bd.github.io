<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car-Robot 3MF Viewer</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            padding: 1rem;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
        }
        #viewer {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        #status {
            position: absolute;
            left: 1rem;
            top: 1rem;
            padding: 0.5rem 0.75rem;
            border-radius: 0.4rem;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            z-index: 1;
            font-size: 0.95rem;
        }
        a {
            color: #80c0ff;
        }
    </style>
</head>
<body>
    <header>
        <h1>Car-Robot 3MF Viewer</h1>
        <p>Das Modell <strong>01_Car-Robot_V9_1.3mf</strong> wird hier interaktiv gerendert. Ziehe mit der Maus, um zu drehen, scrolle zum Zoomen.</p>
    </header>
    <div id="viewer">
        <div id="status">Modell wird geladen …</div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.158.0/build/three.module.js';
        import { OrbitControls } from 'https://unpkg.com/three@0.158.0/examples/jsm/controls/OrbitControls.js';
        import { ThreeMFLoader } from 'https://unpkg.com/three@0.158.0/examples/jsm/loaders/3MFLoader.js';

        const status = document.getElementById('status');
        const container = document.getElementById('viewer');

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x101217);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0.2, 0.65);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight - document.querySelector('header').offsetHeight);
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0.05, 0);

        const loader = new ThreeMFLoader();
        const modelUrl = './01_Car-Robot_V9_1.3mf';

        loader.load(modelUrl, object => {
            object.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            const box = new THREE.Box3().setFromObject(object);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            object.position.sub(center);

            const maxDim = Math.max(size.x, size.y, size.z);
            const distance = maxDim * 1.5;
            camera.position.set(distance, distance * 0.6, distance);
            controls.update();

            scene.add(object);
            status.textContent = 'Modell geladen.';
        }, xhr => {
            if (xhr.lengthComputable) {
                const percent = Math.round((xhr.loaded / xhr.total) * 100);
                status.textContent = `Lade Modell: ${percent}%`;
            }
        }, error => {
            console.error(error);
            const message = error?.message || error?.statusText || String(error);
            status.textContent = `Fehler beim Laden: ${message}`;
            const hint = document.createElement('div');
            hint.style.marginTop = '0.5rem';
            hint.style.fontSize = '0.9rem';
            hint.style.color = '#ffcccc';
            hint.innerHTML = 'Öffne die Seite über einen lokalen HTTP-Server, nicht per Datei-Protokoll (file://).';
            status.appendChild(hint);
        });

        function resize() {
            const headerHeight = document.querySelector('header').offsetHeight;
            renderer.setSize(window.innerWidth, window.innerHeight - headerHeight);
            camera.aspect = window.innerWidth / (window.innerHeight - headerHeight);
            camera.updateProjectionMatrix();
        }

        window.addEventListener('resize', resize);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
